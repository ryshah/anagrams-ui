<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagram Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            margin-top: 30px;
        }

        .results h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .anagram-group {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .anagram-key {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .anagram-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .anagram-item {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #667eea;
            color: #333;
            font-size: 14px;
        }

        .no-anagram-item {
            background: #ffff00;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid rgb(213, 97, 97);
            color: #333;
            font-size: 14px;
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔤 Anagram Finder</h1>
        
        <form id="anagramForm">
            <div class="input-group">
                <label for="textInput">Enter text to find anagrams:</label>
                <input 
                    type="text" 
                    id="textInput" 
                    placeholder="e.g., listen silent enlist"
                    required
                />
            </div>
            <button type="submit" id="submitBtn">Find Anagrams</button>
        </form>

        <div id="results" class="results" style="display: none;"></div>
    </div>

    <script>
        const form = document.getElementById('anagramForm');
        const textInput = document.getElementById('textInput');
        const submitBtn = document.getElementById('submitBtn');
        const resultsDiv = document.getElementById('results');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const text = textInput.value.trim();
            if (!text) return;

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Finding Anagrams...';
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="loading">🔍 Searching for anagrams...</div>';

            try {
                // GraphQL query
                const query = `
                    query FindAnagrams($text: String!) {
                        findAnagrams(text: $text) {
                            word
                            anagrams
                        }
                    }
                `;

                const response = await fetch('/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query,
                        variables: { text }
                    })
                });

                const result = await response.json();

                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }

                displayResults(result.data.findAnagrams);
            } catch (error) {
                displayError(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Find Anagrams';
            }
        });

        function displayResults(anagramGroups) {
            if (!anagramGroups || anagramGroups.length === 0) {
                resultsDiv.innerHTML = '<div class="empty-state">No anagrams found. Try different words!</div>';
                return;
            }

            let html = '<h2>Results:</h2>';
            
            anagramGroups.forEach(group => {
                html += `
                    <div class="anagram-group">
                        <div class="anagram-key">${group.word}</div>
                        <div class="anagram-list">
                            ${group.anagrams.length > 0 ?
                                group.anagrams.map(word => 
                                    `<span class="anagram-item">${word}</span>`
                            ).join('') : `<span class="no-anagram-item">No anagrams found<span>`}
                        </div>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        function displayError(message) {
            resultsDiv.innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
